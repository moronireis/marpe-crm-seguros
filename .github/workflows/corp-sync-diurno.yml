# Sync diurno Corp→CRM (checkpoint 15/07)
# A cada 30 min, 8h–20h30 BRT (11–23 UTC), seg–sáb, chama o endpoint interno que roda
# syncNegocios com detalhe + reconciliação de exclusões. Roda aqui porque o plano
# Vercel Hobby não executa cron sub-diário (o noturno das 3h UTC segue na Vercel).
# Disparo manual: aba Actions → Corp sync diurno → Run workflow.
name: Corp sync diurno

on:
  schedule:
    - cron: '*/30 11-23 * * 1-6'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    # 7 min de teto no job; o curl desiste aos 5,5 min (maxDuration da function é
    # 300s) — evita o run zumbi de 15 min visto em 22/07 quando o login pendurou.
    timeout-minutes: 7
    steps:
      - name: Sincroniza negócios (detalhe + reconciliação)
        run: |
          curl -sS -f -m 330 --connect-timeout 20 \
            -H "x-webhook-key: ${{ secrets.MARPE_WEBHOOK_KEY }}" \
            "https://marpe-crm-seguros.vercel.app/api/internal/corp-sync-negocios"
